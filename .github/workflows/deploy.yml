name: Build and Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/${{ github.repository_owner }}/martinezweb
  PUBLIC_API_URL: https://cms-martinez.qeva.xyz/api
  VITE_API_URL: https://cms-martinez.qeva.xyz/api

concurrency:
  group: deploy
  cancel-in-progress: false

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push sitio web
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ env.IMAGE_PREFIX }}-web:latest
          build-args: |
            PUBLIC_API_URL=${{ env.PUBLIC_API_URL }}

      - name: Build & push panel admin
        uses: docker/build-push-action@v6
        with:
          context: ./admin
          push: true
          tags: ${{ env.IMAGE_PREFIX }}-admin:latest
          build-args: |
            VITE_API_URL=${{ env.VITE_API_URL }}

      - name: Build & push backend
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          tags: ${{ env.IMAGE_PREFIX }}-backend:latest

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Disparar redeploy en Portainer
        run: |
          for url in \
            "${{ secrets.PORTAINER_WEBHOOK_WEB }}" \
            "${{ secrets.PORTAINER_WEBHOOK_ADMIN }}" \
            "${{ secrets.PORTAINER_WEBHOOK_BACKEND }}"; do
            if [ -n "$url" ]; then
              curl -sf -X POST "$url"
            else
              echo "Falta configurar un secret de webhook de Portainer" >&2
              exit 1
            fi
          done
