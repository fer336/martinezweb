name: Release y deploy

# Se dispara al publicar un Release en GitHub, con el tag:
#   web-vX.Y      -> reconstruye y versiona solo el sitio web
#   sistema-vX.Y  -> reconstruye y versiona panel admin + backend
on:
  release:
    types: [published]

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/${{ github.repository_owner }}/martinezweb
  PUBLIC_API_URL: https://cms-martinez.qeva.xyz/api
  VITE_API_URL: https://cms-martinez.qeva.xyz/api

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - name: Interpretar el tag del release
        id: release
        run: |
          TAG="${{ github.event.release.tag_name }}"
          case "$TAG" in
            web-v*)
              echo "version=${TAG#web-v}" >> "$GITHUB_OUTPUT"
              echo "build_web=true" >> "$GITHUB_OUTPUT"
              echo "build_sistema=false" >> "$GITHUB_OUTPUT"
              ;;
            sistema-v*)
              echo "version=${TAG#sistema-v}" >> "$GITHUB_OUTPUT"
              echo "build_web=false" >> "$GITHUB_OUTPUT"
              echo "build_sistema=true" >> "$GITHUB_OUTPUT"
              ;;
            *)
              echo "::error::El tag '$TAG' tiene que empezar con web-v o sistema-v (ej: web-v1.1, sistema-v1.2)"
              exit 1
              ;;
          esac

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push sitio web
        if: steps.release.outputs.build_web == 'true'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}-web:latest
            ${{ env.IMAGE_PREFIX }}-web:${{ steps.release.outputs.version }}
          build-args: |
            PUBLIC_API_URL=${{ env.PUBLIC_API_URL }}

      - name: Build & push panel admin
        if: steps.release.outputs.build_sistema == 'true'
        uses: docker/build-push-action@v6
        with:
          context: ./admin
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}-admin:latest
            ${{ env.IMAGE_PREFIX }}-admin:${{ steps.release.outputs.version }}
          build-args: |
            VITE_API_URL=${{ env.VITE_API_URL }}

      - name: Build & push backend
        if: steps.release.outputs.build_sistema == 'true'
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}-backend:latest
            ${{ env.IMAGE_PREFIX }}-backend:${{ steps.release.outputs.version }}

      - name: Pinnear el tag de imagen en docker-compose.yml
        run: |
          # Swarm no repullea ":latest" de forma confiable en cada redeploy,
          # así que el compose siempre apunta a un tag de versión explícito.
          if [ "${{ steps.release.outputs.build_web }}" = "true" ]; then
            sed -i "s|image: ${{ env.IMAGE_PREFIX }}-web:.*|image: ${{ env.IMAGE_PREFIX }}-web:${{ steps.release.outputs.version }}|" docker-compose.yml
          fi
          if [ "${{ steps.release.outputs.build_sistema }}" = "true" ]; then
            sed -i "s|image: ${{ env.IMAGE_PREFIX }}-admin:.*|image: ${{ env.IMAGE_PREFIX }}-admin:${{ steps.release.outputs.version }}|" docker-compose.yml
            sed -i "s|image: ${{ env.IMAGE_PREFIX }}-backend:.*|image: ${{ env.IMAGE_PREFIX }}-backend:${{ steps.release.outputs.version }}|" docker-compose.yml
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docker-compose.yml
          if ! git diff --cached --quiet; then
            git commit -m "chore(deploy): pin imagen a ${{ github.event.release.tag_name }}"
            git push origin HEAD:main
          fi

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Disparar redeploy del stack en Portainer
        run: |
          if [ -z "${{ secrets.PORTAINER_WEBHOOK }}" ]; then
            echo "Falta configurar el secret PORTAINER_WEBHOOK" >&2
            exit 1
          fi
          curl -sf -X POST "${{ secrets.PORTAINER_WEBHOOK }}"
