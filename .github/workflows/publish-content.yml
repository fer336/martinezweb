name: Publicar contenido

# Lo dispara el botón "Publicar cambios en la web" del CMS (workflow_dispatch
# vía backend/app/github.py). Solo reconstruye el sitio con el contenido
# actual de la base (fotos, trabajos, foto principal) — no toca versiones
# ni el panel/backend. Para eso están los Releases (deploy.yml).
on:
  workflow_dispatch:

env:
  IMAGE: ghcr.io/${{ github.repository_owner }}/martinezweb-web
  PUBLIC_API_URL: https://cms-martinez.qeva.xyz/api
  CONTENT_TAG: content-${{ github.run_number }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push sitio web (contenido actualizado)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE }}:latest
            ${{ env.IMAGE }}:${{ env.CONTENT_TAG }}
          build-args: |
            PUBLIC_API_URL=${{ env.PUBLIC_API_URL }}

      - name: Pinnear el tag de contenido en docker-compose.yml
        run: |
          # Swarm no repullea ":latest" de forma confiable en cada redeploy,
          # así que el compose siempre apunta a un tag único por publicación.
          sed -i "s|image: ${{ env.IMAGE }}:.*|image: ${{ env.IMAGE }}:${{ env.CONTENT_TAG }}|" docker-compose.yml
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docker-compose.yml
          git commit -m "chore(deploy): publicar contenido (${{ env.CONTENT_TAG }})"
          git push origin HEAD:main

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Disparar redeploy del stack en Portainer
        run: |
          if [ -z "${{ secrets.PORTAINER_WEBHOOK }}" ]; then
            echo "Falta configurar el secret PORTAINER_WEBHOOK" >&2
            exit 1
          fi
          curl -sf -X POST "${{ secrets.PORTAINER_WEBHOOK }}"
